name: Build & Package

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install libraries
        run: chmod +x install_libs.sh && ./install_libs.sh

      - name: Lua syntax check
        run: |
          sudo apt-get install -y lua5.4
          for f in Core.lua Data.lua Inspect.lua UI.lua; do
            echo "Checking $f..."
            luac5.4 -p "$f"
          done

      - name: Package addon
        run: |
          ADDON_DIR="DungeonOptimizer"
          mkdir -p build/$ADDON_DIR

          # Copy source files
          cp -r *.lua *.xml *.toc build/$ADDON_DIR/
          cp -r Libs build/$ADDON_DIR/

          # Clean SVN metadata from libs
          find build/$ADDON_DIR/Libs -name ".svn" -type d -exec rm -rf {} + 2>/dev/null || true
          # Clean test files
          rm -rf build/$ADDON_DIR/Libs/LibStub/tests
          rm -f build/$ADDON_DIR/Libs/LibStub/.pkgmeta
          rm -f build/$ADDON_DIR/Libs/LibStub/LibStub.toc

          # Create zip
          cd build
          zip -r ../DungeonOptimizer.zip $ADDON_DIR/
          cd ..

          echo "Package size: $(du -h DungeonOptimizer.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DungeonOptimizer
          path: DungeonOptimizer.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: DungeonOptimizer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DungeonOptimizer.zip
          generate_release_notes: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch CurseForge game version IDs
        id: cf_versions
        run: |
          # Get WoW retail game versions from CurseForge API
          VERSIONS_JSON=$(curl -s \
            "https://wow.curseforge.com/api/game/versions" \
            -H "X-Api-Token: ${{ secrets.CURSE_API_TOKEN }}")

          # Extract the interface version from .toc (e.g. 120005 -> "12.0.5")
          TOC_IFACE=$(grep -oP '## Interface:\s*\K\d+' DungeonOptimizer.toc 2>/dev/null || echo "")
          # Fallback: try Mainline toc
          if [ -z "$TOC_IFACE" ]; then
            TOC_IFACE=$(grep -oP '## Interface:\s*\K\d+' DungeonOptimizer_Mainline.toc 2>/dev/null || echo "120005")
          fi

          # Convert interface number to version string: 120001 -> "12.0.1"
          MAJOR=$((TOC_IFACE / 10000))
          MINOR=$(( (TOC_IFACE % 10000) / 100 ))
          PATCH=$((TOC_IFACE % 100))
          TARGET_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Target WoW version: $TARGET_VERSION"

          # Find matching version IDs (exact match + "Retail" type)
          VERSION_IDS=$(echo "$VERSIONS_JSON" | jq -c \
            --arg ver "$TARGET_VERSION" \
            '[.[] | select(.name == $ver or .name == "Retail") | .id]')

          # Fallback: if no exact match, just use the name match
          if [ "$VERSION_IDS" = "[]" ] || [ -z "$VERSION_IDS" ]; then
            VERSION_IDS=$(echo "$VERSIONS_JSON" | jq -c \
              --arg ver "$TARGET_VERSION" \
              '[.[] | select(.name == $ver) | .id]')
          fi

          echo "Game version IDs: $VERSION_IDS"
          echo "ids=$VERSION_IDS" >> "$GITHUB_OUTPUT"

      - name: Upload to CurseForge
        run: |
          VERSION_IDS='${{ steps.cf_versions.outputs.ids }}'
          # Fallback to known IDs if dynamic fetch failed
          if [ "$VERSION_IDS" = "[]" ] || [ -z "$VERSION_IDS" ]; then
            VERSION_IDS="[14422]"
            echo "WARNING: Using fallback game version IDs"
          fi

          METADATA=$(cat <<ENDJSON
          {
            "changelog": "See https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
            "changelogType": "text",
            "displayName": "DungeonOptimizer ${{ steps.version.outputs.version }}",
            "gameVersions": ${VERSION_IDS},
            "releaseType": "release"
          }
          ENDJSON
          )

          echo "Metadata: $METADATA"

          curl -f -X POST \
            "https://wow.curseforge.com/api/projects/${{ vars.CURSEFORGE_PROJECT_ID }}/upload-file" \
            -H "X-Api-Token: ${{ secrets.CURSE_API_TOKEN }}" \
            -F "metadata=$METADATA" \
            -F "file=@DungeonOptimizer.zip"
